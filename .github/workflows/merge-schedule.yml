name: Merge Schedule

on:
  schedule:
    # 保持每 5 分鐘巡邏一次
    - cron: '*/5 * * * *'

jobs:
  merge_schedule:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      statuses: read
    steps:
      - uses: gr2m/merge-schedule-action@v2
        with:
          merge_method: squash
          time_zone: 'Asia/Taipei'
          require_statuses_success: 'false'
          automerge_fail_label: 'merge-schedule-failed'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
